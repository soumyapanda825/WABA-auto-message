<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — EventBooze Vendor Outreach</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.brand svg { width: 32px; height: 32px; color: #128c7e; }
.brand h1  { font-size: 1.25rem; font-weight: 700; color: #111b21; }

.card {
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,.1);
  padding: 36px 32px;
  width: 100%;
  max-width: 380px;
}
.card h2 {
  font-size: 1.05rem;
  font-weight: 700;
  color: #111b21;
  margin-bottom: 6px;
}
.card p {
  font-size: .85rem;
  color: #8696a0;
  margin-bottom: 26px;
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: .78rem;
  font-weight: 600;
  color: #54656f;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  border: 1.5px solid #d9dee2;
  border-radius: 8px;
  padding: 11px 14px;
  font-size: .95rem;
  font-family: inherit;
  outline: none;
  color: #111b21;
  transition: border-color .2s;
}
.field input:focus { border-color: #128c7e; }

.error-msg {
  background: #fff5f5;
  border: 1px solid #ffe0e0;
  color: #d9534f;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: .85rem;
  margin-bottom: 16px;
}

button[type=submit] {
  width: 100%;
  padding: 12px;
  background: #128c7e;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
  transition: background .2s;
}
button[type=submit]:hover { background: #0e7a6d; }
</style>
</head>
<body>

<div class="brand">
  <svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
  </svg>
  <h1>EventBooze Vendor Outreach</h1>
</div>

<div class="card">
  <h2>Sign in</h2>
  <p>Enter your credentials to access the portal.</p>

  <form action="/auth/login" method="POST">

    <div id="error-box" class="error-msg" style="display:none;">
      Incorrect email or password.
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
    </div>

    <button type="submit">Sign in</button>
  </form>
</div>

<script>
  // Show error if ?error=1 in URL
  if (new URLSearchParams(location.search).get('error') === '1') {
    document.getElementById('error-box').style.display = 'block';
  }
</script>
</body>
</html>
