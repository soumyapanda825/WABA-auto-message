<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — EventBooze Vendor Outreach</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: #fff;
  width: 100%;
  max-width: 360px;
  margin: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  overflow: hidden;
}
.login-header {
  background: #128c7e;
  color: #fff;
  padding: 24px;
  text-align: center;
}
.login-header h1 {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 600;
}
.login-body {
  padding: 28px 24px;
}
label {
  display: block;
  font-size: .85rem;
  font-weight: 600;
  color: #54656f;
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 10px 12px;
  font-size: .95rem;
  border: 1px solid #d9dee2;
  border-radius: 6px;
  margin-bottom: 18px;
  outline: none;
  transition: border-color .15s;
}
input:focus { border-color: #128c7e; }
button {
  width: 100%;
  padding: 11px;
  font-size: .95rem;
  font-weight: 600;
  color: #fff;
  background: #128c7e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
}
button:hover { background: #0e7a6d; }
.error {
  background: #fff0f0;
  color: #d9534f;
  font-size: .85rem;
  padding: 10px 12px;
  border-radius: 6px;
  margin-bottom: 18px;
  text-align: center;
}
</style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <h1>EventBooze Vendor Outreach</h1>
    </div>
    <div class="login-body">
      <div class="error" id="error-box" style="display:none;">Incorrect email or password.</div>
      <form method="POST" action="/auth/login">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="username" required autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit">Log In</button>
      </form>
    </div>
  </div>
<script>
if (new URLSearchParams(location.search).get('error')) {
  document.getElementById('error-box').style.display = 'block';
}
</script>
</body>
</html>
